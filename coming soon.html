<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon - Lunéa Bags</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(to bottom right,#fff7f8,#fdeff4);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.container{
    background:white;
    width:100%;
    max-width:1200px;
    border-radius:35px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 1fr;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.image{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:0;
    margin:0;
}

.image img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.content{
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.small{
    color:#ff4f81;
    letter-spacing:4px;
    margin-bottom:15px;
    font-weight:600;
}

h1{
    font-size:60px;
    color:#333;
    margin-bottom:25px;
    line-height:1.2;
}

.secret{
    color:#ff4f81;
    font-weight:600;
    margin-bottom:20px;
    font-size:20px;
}

.desc{
    color:#666;
    line-height:2;
    margin-bottom:30px;
}

.tag{
    background:#fff0f3;
    color:#ff4f81;
    width:fit-content;
    padding:12px 24px;
    border-radius:30px;
    margin-bottom:30px;
    font-weight:600;
}

.btn{
    text-decoration:none;
    background:#ff4f81;
    color:white;
    width:fit-content;
    padding:15px 28px;
    border-radius:35px;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-3px);
}

</style>
</head>

<body>

<div class="container">

    <div class="image">
        <img src="secret.png" alt="coming soon">
    </div>

    <div class="content">

        <p class="small">✨ LUNÉA NEW COLLECTION ✨</p>

        <h1>Coming <br>Soon</h1>

        <p class="secret">
            🌸 Secret Collection : “Lunéa Secret Bag”
        </p>

        <p class="desc">
            Our newest tote bag collection is coming soon with a more elegant,
            modern, and aesthetic design specially made for your daily style.
        </p>

        <div class="tag">
            ☁️ Stay Tuned
        </div>

        <a href="index.html" class="btn">
            Back to Home
        </a>

    </div>

</div>

</body>
</html>
