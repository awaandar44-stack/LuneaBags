<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special Promo - Lunéa Bags</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(to bottom right,#fff7f8,#fdeff4);
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.promo-container{
    background:white;
    max-width:1200px;
    width:100%;
    border-radius:35px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 1fr;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.promo-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.promo-text{
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.mini{
    color:#ff4f81;
    letter-spacing:3px;
    margin-bottom:15px;
    font-weight:600;
}

.promo-text h1{
    font-size:55px;
    color:#333;
    line-height:1.2;
    margin-bottom:25px;
}

.desc{
    color:#666;
    line-height:2;
    margin-bottom:30px;
}

.badge{
    background:#fff0f3;
    color:#ff4f81;
    width:fit-content;
    padding:12px 24px;
    border-radius:30px;
    margin-bottom:30px;
    font-weight:600;
}

.btn{
    text-decoration:none;
    background:#ff4f81;
    color:white;
    width:fit-content;
    padding:15px 28px;
    border-radius:35px;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-3px);
}

</style>
</head>

<body>

<div class="promo-container">

    <div class="promo-image">
        <img src="promo.png" alt="promo">
    </div>

    <div class="promo-text">

        <p class="mini">✨ LUNÉA SPECIAL ✨</p>

        <h1>New Arrival <br> Special Promo</h1>

        <p class="desc">
            Discover our newest tote bag collection with modern aesthetic style,
            simple design, and comfortable daily use.
        </p>

        <a href="index.html" class="btn">
            Back to Home
        </a>

    </div>

</div>

</body>
</html>
