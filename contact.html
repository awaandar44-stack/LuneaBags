<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact - Lunéa Bags</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      background: linear-gradient(to bottom right, #fff7f8, #fdf0f5);
      padding: 30px;
    }

    .container{
      max-width: 1000px;
      margin: auto;
      background: white;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .banner img{
      width: 100%;
      height: 350px;
      object-fit: cover;
    }

    .content{
      padding: 40px;
      text-align: center;
    }

    h1{
      color: #ff4f81;
      font-size: 42px;
      margin-bottom: 15px;
    }

    .desc{
    margin-top: 40px;
    color: #666;
    line-height: 1.8;
}

    .contact-grid{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
      gap: 25px;
    }

    .card{
      background: #fff0f3;
      padding: 30px 20px;
      border-radius: 25px;
      transition: 0.3s;
    }

    .card:hover{
      transform: translateY(-8px);
    }

    .card h2{
      color: #ff4f81;
      margin-bottom: 15px;
      font-size: 24px;
    }

    .card p{
      color: #555;
      line-height: 1.7;
    }

    .back{
      display: inline-block;
      margin-top: 40px;
      text-decoration: none;
      background: #ff4f81;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      transition: 0.3s;
    }

    .back:hover{
      opacity: 0.8;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="banner">
      <img src="contact.png" alt="banner">
    </div>

    <div class="content">

      <div class="contact-grid">

        <div class="card">
          <h2>📱 Instagram</h2>
          <p>@luneabags.id</p>
        </div>

        <div class="card">
          <h2>💌 Email</h2>
          <p>luneabags@gmail.com</p>
        </div>

        <div class="card">
          <h2>📞 WhatsApp</h2>
          <p>0812-3456-7890</p>
        </div>

      </div>

      <p class="desc">
        Thank you for visiting Lunéa Bags.  
        Feel free to contact us for order, collaboration, or more information about our collection.
      </p>


      <a href="index.html" class="back">← Back to Home</a>

    </div>

  </div>

</body>
</html>
